[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short --alluredir=allure-reports
log_cli = True
log_format = [%(asctime)s %(threadName)s %(levelname)s: %(module)s:%(lineno)s %(funcName)s - %(message)s]
log_date_format = %Y-%m-%d %H:%M:%S
log_level = INFO
